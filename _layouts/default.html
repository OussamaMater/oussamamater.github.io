<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css">

	<style>
		.navbar
		{
      overflow: hidden;
		}

    .navbar a
    {
      float: left;
      font-size: 16px;
      color: white;
      padding: 2px 15px;
      text-align: center;
      text-decoration: none;
    }

    .dropdown
    {
      float: left;
      overflow: hidden;
    }

    .dropdown .dropbtn
    {
      font-size: 16px;
      border: none;
      outline: none;
      color: white;
      padding: 2px 15px;
      background-color: inherit;
      font-family: inherit;
      margin: 0;
    }

    .navbar a:hover, .dropdown:hover .dropbtn
    {
      background-color: green;
    }

    .dropdown-content
    {
      display: none;
      position: absolute;
      background-color: #202020;
      min-width: 150px;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      z-index: 1;
    }

    .dropdown-content a
    {
      float: none;
      color: white;
      padding: 8px 14px;
      text-decoration: none;
      display: block;
      text-align: left;
    }

    .dropdown-content a:hover
    {
      background-color: #4666FF;
    }

    .dropdown:hover .dropdown-content
    {
      display: block;
    }
	</style>

{% seo %}
  </head>

  <body>

    <header>
      <div class="container">
        <a id="a-title" href="{{ '/' | relative_url }}">
          <h1>{{ site.title | default: site.github.repository_name }}</h1>
        </a>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>

          <section class="navbar">
            <a href="https://deskel.github.io/donate">Home</a>
            <a href="https://deskel.github.io/donate">TryHackMe</a>
            <a href="https://deskel.github.io/donate">HackTheBox</a>
            <a href="https://deskel.github.io/donate">Vulnhub</a>
            <a href="https://deskel.github.io/donate">ChallengeLand</a>
            <a href="https://deskel.github.io/donate">WebHacking.kr</a>
			<a href="https://deskel.github.io/donate">BackDoor</a>
        </section>

      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>

    {% if site.google_analytics %}
      <script>
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
        ga('create', '{{ site.google_analytics }}', 'auto');
        ga('send', 'pageview');
      </script>
    {% endif %}
  </body>
</html>
